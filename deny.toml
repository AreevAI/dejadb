# cargo-deny configuration — supply-chain gate for DejaDB.
#
#   cargo install cargo-deny
#   cargo deny check
#
# Enforced in CI. Tune the allow-lists below as the dependency tree evolves;
# every `ignore`/exception must carry a comment explaining why.

[advisories]
version = 2
# Fail the build on any RUSTSEC advisory affecting the dependency graph, and on
# any yanked crate. Add specific advisory IDs to `ignore` only with a documented
# justification and a tracking issue.
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# DejaDB is `MIT OR Apache-2.0`; only permissive, compatible licenses are
# allowed in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # The Mozilla CA-certificate bundle shipped by `webpki-roots` (pulled via
    # ureq → rustls for the out-of-box LLM provider HTTPS calls). A permissive
    # data license, not copyleft.
    "CDLA-Permissive-2.0",
]

[bans]
# Large dependency trees legitimately carry duplicate versions; surface them as
# warnings rather than hard failures.
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
