name: Security

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly, so newly-disclosed advisories are caught even without a push.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources bans

  fuzz-smoke:
    name: fuzz targets build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Run from the repo root (auto-detects the detached `fuzz/` workspace).
      # Force the gnu target: the runner's default host can be musl, whose
      # static libc is incompatible with the fuzzer's AddressSanitizer.
      - name: Build fuzz targets (compile-only)
        run: cargo fuzz build --target x86_64-unknown-linux-gnu
