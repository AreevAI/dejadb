# Publish the Node bindings (crates/dejadb-js) to npm as `dejadb`.
#
# napi-rs ships a native addon per platform. This builds the `.node` for each
# target, then publishes one small platform package per target
# (`dejadb-<platform>`) plus the thin main package that loads the right one at
# runtime via optionalDependencies (the layout the review flagged as missing).
#
# Trigger: on a published GitHub Release (tag `vX.Y.Z`) or manual dispatch.
# Prerequisite secret: `NPM_TOKEN` (an npm automation token for the `dejadb`
# package / the account that owns it).
#
# NOTE: native cross-platform CI is finicky — watch the first release run and
# adjust the target matrix / napi flags to your installed @napi-rs/cli (v3) if a
# leg fails. The set of targets here must match `napi.targets` in package.json.
name: release-npm

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    working-directory: crates/dejadb-js

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npx napi build --platform --release --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npx napi build --platform --release --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npx napi build --platform --release --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # Use Ubuntu's modern cross-gcc (not `--use-napi-cross`, whose
            # bundled gcc is too old to compile the C deps — mimalloc/zstd).
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            build: |
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              npx napi build --platform --release --target aarch64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npx napi build --platform --release --target x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Setup cross toolchain
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}
      - run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/dejadb-js/*.node
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install
      - uses: actions/download-artifact@v8
        with:
          path: crates/dejadb-js/artifacts
      - name: Create platform package dirs
        run: npx napi create-npm-dirs
      - name: Collect per-platform binaries into npm/ dirs
        run: npx napi artifacts
      - name: Publish platform packages + main to npm
        # We do NOT use `napi prepublish` here: it publishes every platform
        # package in one shot and aborts the whole release if one fails —
        # useful if any single platform name ever trips npm's spam filter
        # (403 on publish) and needs to be deferred without taking the whole
        # release down with it.
        #
        # Instead `prepare-npm.mjs` stamps versions, wires the main package's
        # optionalDependencies to ALL platforms (incl. any deferred one, so a
        # later same-version publish resolves for installs), and prints the dirs
        # to publish now. We publish each, skipping anything already on the
        # registry so re-runs are idempotent — including a later run that
        # un-defers a package, which then publishes only the missing one.
        run: |
          set -euo pipefail
          publish_if_absent() { # $1 = package name, $2 = version, $3 = dir
            if [ "$(npm view "$1@$2" version 2>/dev/null || true)" = "$2" ]; then
              echo "$1@$2 already on npm — skipping"
            else
              echo "Publishing $1@$2"
              (cd "$3" && npm publish --access public)
            fi
          }
          mapfile -t DIRS < <(node scripts/prepare-npm.mjs)
          for dir in "${DIRS[@]}"; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            publish_if_absent "$name" "$ver" "$dir"
          done
          main_name=$(node -p "require('./package.json').name")
          main_ver=$(node -p "require('./package.json').version")
          publish_if_absent "$main_name" "$main_ver" "."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
