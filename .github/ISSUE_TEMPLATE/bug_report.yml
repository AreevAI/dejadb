name: Bug report
description: Report a problem or unexpected behavior in DejaDB.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        Before submitting, please search existing issues to avoid duplicates.
        Do **not** report security vulnerabilities here — see
        [SECURITY.md](../../SECURITY.md) for private reporting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what you saw...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, complete steps (or a code/CLI snippet) that reproduce the problem.
      placeholder: |
        1. Run `dejadb ...`
        2. Then ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: DejaDB version / crate
      description: Release, commit SHA, or the specific crate (e.g. dejadb-store 0.0.1).
      placeholder: "e.g. 0.1.0 / dejadb-cal @ abc1234"
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: Platform / OS
      description: Operating system, architecture, and Rust/Python version if relevant.
      placeholder: "e.g. macOS 15 arm64, rustc 1.85"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant log output or error messages. This is automatically formatted, so no backticks needed.
      render: shell
    validations:
      required: false
