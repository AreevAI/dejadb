# Fail the build (or surface a review) when the agent backend has pending
# high-severity recommendations. Memory files are runtime state, so this runs
# on a schedule or against a synced/checked-out backend — not at commit time.
#
# Copy into .github/workflows/ and point --db at your backend file.
name: waiser-gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  review-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deja
        run: cargo install dejadb # or: pip install dejadb && ln -s "$(python -c 'import dejadb,os;print(os.path.dirname(dejadb.__file__))')" .

      - name: Analyze the backend
        run: deja waiser run --db agent.db --ns caller --format json

      - name: Gate on pending high-severity recommendations
        run: |
          # exit 0 = none match, 2 = a pending high-severity recommendation
          # exists (build-blocking), 1 = error.
          deja waiser list --db agent.db --ns caller --fail-on high --format json
